StylesPath = .github/styles
MinAlertLevel = suggestion

Vocab = Midnight

# Ignore code and JSX blocks
IgnoredScopes = code, tt
SkippedScopes = script, style, pre, code, tt

# Ignore inline code
IgnoredPaths = **/_*

# Markdown and MDX
[*.{md,mdx}]
BasedOnStyles = Midnight
TokenIgnores = (?s)<!--truncate-->, (?s)\{/\*.*?\*/\}