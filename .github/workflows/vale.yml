name: Vale Docs Lint

on:
  pull_request:
    paths:
      - "docs/**"
      - "**.mdx"
      - "sdks/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  vale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 22
    
      - run: npm install -g mdx2vast

      - name: Run Vale
        uses: errata-ai/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # v2.1.2
        with:
          reporter: github-pr-review
          filter_mode: added
          files: '["docs", "sdks"]'
          fail_on_error: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}