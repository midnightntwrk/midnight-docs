name: Vale Docs Lint

on:
  pull_request:
    paths:
      - "docs/**"
      - "**.md"
      - "**.mdx"

jobs:
  vale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Vale
        uses: errata-ai/vale-action@v2
        with:
          reporter: github-pr-review
          filter_mode: added
          files: docs
          fail_on_error: false